# data.yaml — YOLO dataset configuration for banana ripeness detection
# Place your dataset in the structure below, or update paths accordingly.
#
# data/
#   yolo/
#     test/
#       images/   ← training images
#       labels/     ← validation images
#     train/
#       images/   
#       labels/
#     valid/
#       images/   
#       labels/

path: ../data/yolo        # root dataset directory
train: train/images
val:   valid/images
test:  test/images        # optional

# Number of classes
nc: 6
names: ['freshripe', 'freshunripe', 'overripe', 'ripe', 'rotten', 'unripe']
